{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "title" .}}darek{{end}}</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
</head>
<body>
<header class="app">
  <a href="/" class="brand">darek</a>
  <nav class="primary">
    {{range .Page.Nav}}<a href="{{.Path}}"{{if eq .Key $.Page.ActiveKey}} class="active"{{end}}>{{.Label}}</a>
    {{end}}
  </nav>
  <span class="spacer"></span>
  <div id="sync-banner"></div>
  <form class="sync-form" method="post" action="/sync" hx-post="/sync" hx-target="#sync-banner" hx-swap="innerHTML">
    <button type="submit">sync now</button>
  </form>
</header>
<main>
  {{block "content" .}}{{end}}
</main>
<footer class="app-footer">
  <span class="brand">{{.Page.Footer.Brand}}</span>
  <span class="muted">v{{.Page.Footer.Version}}</span>
  <span class="muted">last sync: {{.Page.Footer.LastSync}}</span>
</footer>
</body>
</html>
{{end}}
