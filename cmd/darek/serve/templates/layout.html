{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{block "title" .}}darek{{end}}</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
</head>
<body>
<header>
  <a href="/" class="brand">darek</a>
  <nav>
    <a href="/">queue</a>
    <a href="/all">archive</a>
    <form method="post" action="/sync" hx-post="/sync" hx-target="#sync-banner" hx-swap="innerHTML">
      <button type="submit">sync now</button>
    </form>
  </nav>
  <div id="sync-banner"></div>
</header>
<main>
  {{block "content" .}}{{end}}
</main>
</body>
</html>
{{end}}
