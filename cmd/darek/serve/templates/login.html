<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>darek — sign in</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth">
  <main class="login-card">
    <h1>darek</h1>
    {{ if .Error }}<p class="error">You are not a member of the darek-users group. Ask Bartek for access.</p>{{ end }}
    <form method="GET" action="/login">
      <input type="hidden" name="next" value="{{ .Next }}">
      <button type="submit">Sign in with Authentik</button>
    </form>
  </main>
</body>
</html>
