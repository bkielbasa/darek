{{define "_row.html"}}
<div class="row" id="row-{{.ID}}">
  <span class="kind {{.Kind}}">{{.Kind}}</span>
  {{if .Feed}}<span class="meta">{{.Feed}}</span>{{end}}
  <a href="{{.URL}}" target="_blank" rel="noopener">{{if .Title}}{{.Title}}{{else}}{{.URL}}{{end}}</a>
  <span class="meta">· {{.RelTime}}</span>
  <div class="stars" id="rating-{{.ID}}">
    {{range $n := .RatingButtons}}
      <button hx-post="/links/{{$.ID}}/rating?value={{$n.Value}}" hx-target="#rating-{{$.ID}}" hx-swap="outerHTML">
        {{if $n.Filled}}★{{else}}☆{{end}}
      </button>
    {{end}}
  </div>
  <div class="tags" id="tags-{{.ID}}">
    {{range .Tags}}
      <span class="tag">{{.}}
        <form hx-post="/links/{{$.ID}}/tags" hx-target="#tags-{{$.ID}}" hx-swap="outerHTML" hx-vals='{"op":"remove"}'>
          <input type="hidden" name="tag" value="{{.}}">
          <button type="submit" title="remove">×</button>
        </form>
      </span>
    {{end}}
    <form hx-post="/links/{{.ID}}/tags" hx-target="#tags-{{.ID}}" hx-swap="outerHTML" hx-vals='{"op":"add"}'>
      <input type="text" name="tag" placeholder="+ tag" size="8">
    </form>
  </div>
  <div class="notes" id="notes-{{.ID}}">
    <details>
      <summary>{{if .Notes}}{{.Notes}}{{else}}(no notes){{end}}</summary>
      <form hx-post="/links/{{.ID}}/notes" hx-target="#notes-{{.ID}}" hx-swap="outerHTML">
        <textarea name="notes">{{.Notes}}</textarea>
        <button type="submit">save</button>
      </form>
    </details>
  </div>
</div>
{{end}}
