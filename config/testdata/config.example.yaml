openai:
  model: gpt-4.1
  api_key_env: DAREK_OPENAI_API_KEY

postgres:
  url_env: DAREK_POSTGRES_URL

otel:
  service_name: darek
  exporter_endpoint: localhost:4317
  insecure: true

agent:
  max_iterations: 10
  llm_timeout: 60s
  tool_timeout: 30s

memory:
  pgvector: false
  embedding_model: text-embedding-3-small

links:
  pgvector: false  # opt-in: enable pgvector embeddings for similarity (requires future plan)

todoist:
  token_env: DAREK_TODOIST_TOKEN
  sync_interval: 15m       # how often the in-server loop polls (0 disables)

freshrss:
  base_url: https://rss.example.com
  username: alice
  password_env: DAREK_FRESHRSS_PASSWORD
  sync_interval: 15m       # how often the in-server loop polls (0 disables)

server:
  bind: 127.0.0.1:7777

calendars:
  - kind: ical
    nickname: family
    url: https://calendar.example.com/feed.ics
  # - kind: google
  #   nickname: personal
  #   calendar_id: primary
  #   client_id_env: DAREK_GCAL_CLIENT_ID
  #   client_secret_env: DAREK_GCAL_CLIENT_SECRET

mail:
  attachments_dir: ~/.darek/attachments
  attachment_ttl_days: 30
  accounts:
    - nickname: personal
      email: me@example.com
      imap: { host: imap.fastmail.com, port: 993, tls: true }
      smtp: { host: smtp.fastmail.com, port: 465, tls: true }
      username: me@example.com
      secret_env: DAREK_MAIL_PERSONAL
      sync_folders: [INBOX]

blog_marketing:
  sync_interval: 15m         # 0 disables the in-server loop
  project_name: Marketing    # default for every feed; can be overridden per feed
  post_time: "09:00"         # default; can be overridden per feed
  timezone: Europe/Warsaw    # default; can be overridden per feed
  feeds:
    - id: tech-blog
      feed_url: https://blog.example.com/feed.xml
      accounts:
        x:
          handle: "@bk_tech"
          # token_env: DAREK_TECH_X_TOKEN  # set when X auto-poster lands
        mastodon:
          handle: "@bk@fosstodon.org"
          instance: https://fosstodon.org
          token_env: DAREK_TECH_MASTODON_TOKEN
        linkedin:
          handle: "bartlomiej-klimczak"
    - id: side-blog
      feed_url: https://other.example.com/feed.xml
      accounts:
        mastodon:
          handle: "@bk_side@mastodon.social"
          instance: https://mastodon.social
          token_env: DAREK_SIDE_MASTODON_TOKEN
      project_name: Marketing-Side  # opt-in per-blog override

auth:
  issuer: https://authentik.example.com/application/o/darek/
  client_id: darek
  client_secret_env: DAREK_OIDC_CLIENT_SECRET
  redirect_url: https://darek.example.com/auth/callback
  required_group: darek-users
  session_key_env: DAREK_SESSION_KEY
  session_ttl: 720h
