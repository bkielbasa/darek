openai:
  model: gpt-4.1
  api_key_env: DAREK_OPENAI_API_KEY

postgres:
  url_env: DAREK_POSTGRES_URL

otel:
  service_name: darek
  exporter_endpoint: localhost:4317
  insecure: true

agent:
  max_iterations: 10
  llm_timeout: 60s
  tool_timeout: 30s

memory:
  pgvector: false
  embedding_model: text-embedding-3-small
